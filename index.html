<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Radar</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { max-width: 800px; margin: 0 auto; padding: 40px 20px; font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; }
    h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
    h2 { color: #58a6ff; margin-top: 30px; }
    a { color: #58a6ff; }
    #briefing-list a { display: block; padding: 12px; margin: 8px 0; background: #161b22; border: 1px solid #30363d; border-radius: 6px; text-decoration: none; }
    #briefing-list a:hover { border-color: #58a6ff; }
    #content { background: #161b22; padding: 24px; border-radius: 6px; border: 1px solid #30363d; line-height: 1.6; }
    .tag { background: #1f6feb; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>🔭 Research Radar</h1>
  <p>AI-powered research briefings, auto-generated by a multi-agent pipeline.</p>

  <h2>Latest Briefings</h2>
  <div id="briefing-list">
    <a href="briefings/2026-03-15-fraud-detection.md" onclick="loadBriefing(this.href); return false;">
      2026-03-15 — Fraud Detection <span class="tag">latest</span>
    </a>
  </div>

  <div id="content"></div>

  <script>
    async function loadBriefing(url) {
      const res = await fetch(url);
      const text = await res.text();
      document.getElementById('content').innerHTML = marked.parse(text);
      window.scrollTo(0, document.getElementById('content').offsetTop - 20);
    }
    // Auto-load latest
    loadBriefing('briefings/2026-03-15-fraud-detection.md');
  </script>
</body>
</html>
